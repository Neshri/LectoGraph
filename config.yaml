# ─── LectoGraph Ingestion Config ────────────────────────────────────────────
# Edit this file to change models, paths, or processing settings.
# All paths are relative to the directory you run ingest.py from.

# ─── Paths ───────────────────────────────────────────────────────────────────
input_folder: ./input          # Folder containing video files to process
working_dir: ./knowledge_db    # LightRAG graph database storage
docs_dir: ./docs               # Where formatted knowledge .txt docs are saved
logs_dir: ./logs               # One log file per run, named by timestamp

# ─── OpenSceneSense (video analysis) ─────────────────────────────────────────
whisper_model: KBLab/kb-whisper-large
whisper_device: cuda           # "cuda" or "cpu"

# Vocabulary hint for Whisper — helps correct accent-driven mishearings.
# Written as natural text; Whisper uses this as a transcription prior.
whisper_initial_prompt: "Detta är en teknisk lektion på svenska om IT, datorer, nätverk, operativsystem och mjukvara."

# Comma-separated list of technical terms to explicitly boost during decoding.
# Add terms here as new mishearings (like DOCP -> DHCP) are discovered.
whisper_hotwords: >
  DHCP, DNS, TCP/IP, IP-adress, subnet, subnetmask, gateway, router, switch, VLAN, NAT,
  SSH, RDP, HTTP, HTTPS, FTP, SMTP, IMAP, VPN, firewall, ACL, OSPF, BGP,
  Active Directory, GPO, LDAP, Kerberos, PowerShell, CMD, config, configuration,
  ping, traceroute, netstat, ipconfig, nslookup,
  Cisco, Windows Server, virtualisering, nätverkskort, server, klient
frame_analysis_model: glm-ocr
summary_model: gemma4:31b

min_frames: 5
max_frames: 55
frames_per_minute: 3.0
frame_threshold: 50.0          # DynamicFrameSelector scene-change sensitivity
request_timeout: 600.0         # Seconds before Ollama request times out
request_retries: 1

# ─── LightRAG / Ollama ───────────────────────────────────────────────────────
ollama_url: http://127.0.0.1:11434
rag_llm_model: qwen3:32b
rag_request_timeout: 600.0
# WARNING: Do NOT change rag_embedding_model or rag_embedding_dim after the
# knowledge_db has been created. The stored vectors will be incompatible with
# the new model and queries will silently return garbage. If you need to switch
# models, delete knowledge_db/ and re-run ingest.py from scratch.
rag_embedding_model: qwen3-embedding:8b
rag_embedding_dim: 4096
rag_llm_num_ctx: 8192
rag_llm_temperature: 0.1
rag_llm_think: false

# ─── Processing ──────────────────────────────────────────────────────────────
# File extensions to scan in input_folder (case-insensitive)
video_extensions:
  - .mp4
  - .mkv
  - .avi
  - .mov
  - .webm

# ─── Prompts ─────────────────────────────────────────────────────────────────
# Prompt sent to the frame analysis model for each extracted video frame.
# Tune this to match the content type of your videos — e.g. for non-IT courses
# you'd change "IT-lektion" and the list of things to look for.
frame_analysis_prompt: |
  Du analyserar en skärmbild från en IT-lektion.
  Beskriv endast vad som är direkt synligt: öppna fönster, programnamn,
  terminalutskrifter, fil- och mappstrukturer, dialogrutor och text på skärmen.
  Dra inga slutsatser eller antaganden om sådant som inte syns direkt.

detailed_summary_prompt: |
  Du sammanfattar en IT-lektion från en skärminspelning.
  Baserat strikt på skärmtidslinjen och ljudtranskriptionen nedan,
  skriv en trovärdig sammanfattning på svenska av vad som undervisades.
  Lägg inte till information som inte finns i källmaterialet.
  Om ett specifikt värde såsom en kod, ett kommando eller en identifierare
  inte finns explicit i tidslinjen eller transkriptionen, utelämna det helt.

  Videolängd: {duration:.1f} sekunder

  Skärmtidslinje:

  {timeline}

  Ljudtranskription:

  {transcript}

brief_summary_prompt: |
  Baserat strikt på denna {duration:.1f} sekunder långa IT-lektion,
  skriv en kortfattad sammanfattning på svenska av vad som demonstrerades och förklarades.
  Ta endast med det som finns explicit i tidslinjen och transkriptionen.
  Om ett specifikt värde såsom en kod, ett kommando eller en identifierare
  inte finns explicit i tidslinjen eller transkriptionen, utelämna det helt.

  Skärmtidslinje:

  {timeline}

  Transkription:

  {transcript}

# ─── Transcript correction ────────────────────────────────────────────────────
# Prompt used by correct_transcript() when the Whisper transcript contains a
# known-bad term but the summaries are clean enough to act as a reference.
# The model must return ONLY a JSON object — no prose, no code fences.
# Placeholders: {brief}, {detailed}, {transcript}
transcript_correction_prompt: |
  Du är en korrekturläsare för svenska IT-lektioner.
  Transkriptionen nedan innehåller troligen felavlyssnade ord från Whisper.
  Du har en pålitlig referenssammanfattning att jämföra med.

  Din uppgift:
  1. Identifiera ord i transkriptionen som verkar felstavade eller felavlyssnade
     jämfört med referensen.
  2. Returnera ett JSON-objekt med ett enda fält "replacements" — en lista av
     {{"wrong": "...", "right": "..."}} par. Listan kan vara tom om inget hittas.
  3. Returnera ENDAST giltig JSON, inget annat — inga förklaringar, inga kodblock.

  Referenssammanfattning (kort):
  {brief}

  Referenssammanfattning (detaljerad):
  {detailed}

  Transkription:
  {transcript}
